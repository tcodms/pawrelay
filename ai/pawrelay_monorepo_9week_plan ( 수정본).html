const tabsEl = document.getElementById('tabs');
const panelsEl = document.getElementById('panels');

weeks.forEach((w, i) => {
  const tab = document.createElement('button');
  tab.className = 'wtab' + (i === 0 ? ' active' : '');
  tab.textContent = w.label;
  tab.onclick = () => {
    document.querySelectorAll('.wtab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.week-panel').forEach(p => p.classList.remove('show'));
    tab.classList.add('active');
    document.getElementById('panel-' + i).classList.add('show');
  };
  tabsEl.appendChild(tab);

  const roleData = [
    { key: 'fe', label: '프론트엔드', data: w.fe },
    { key: 'be', label: '백엔드', data: w.be },
    { key: 'ai', label: 'AI / 데이터 ⭐', data: w.ai },
  ];

  const sharedHtml = w.shared ? `
    <div class="shared-box">
      <div class="shared-title">${w.shared.title}</div>
      <ul class="task-list">
        ${w.shared.tasks.map(t => `<li class="${t.cls}">${t.text}</li>`).join('')}
      </ul>
    </div>` : '';

  const rolesHtml = roleData.map(r => {
    const d = r.data;
    if (!d) return '';
    return `
      <div class="role-card ${r.key}">
        <span class="role-label ${r.key}">${r.label}</span>
        ${d.branch ? `<div class="branch-pill">⑂ ${d.branch}</div>` : ''}
        <ul class="task-list">
          ${d.tasks.map(t => `<li class="${t.cls}">${t.text}</li>`).join('')}
        </ul>
      </div>`;
  }).join('');

  const panel = document.createElement('div');
  panel.className = 'week-panel' + (i === 0 ? ' show' : '');
  panel.id = 'panel-' + i;
  panel.innerHTML = `
    <div class="week-header">
      <div class="week-title">${w.title}</div>
      <div class="week-sub">${w.sub}</div>
    </div>
    ${sharedHtml}
    <div class="roles">${rolesHtml}</div>
    <div class="milestone"><strong>이번 주 마일스톤:</strong> ${w.milestone}</div>
    ${w.note ? `<div class="note">${w.note}</div>` : ''}
  `;
  panelsEl.appendChild(panel);
});
